<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Фитнес-план</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090E;--s1:#0F1119;--s2:#171825;--s3:#1E2038;--bd:#252A42;
  --blue:#4F8EF7;--violet:#7C6FF7;--cyan:#22D3EE;--green:#22C55E;
  --amber:#F59E0B;--red:#EF4444;--orange:#FB923C;--pink:#EC4899;
  --text:#F1F5F9;--t2:#94A3B8;--dim:#475569;
  --A:#7BF045;--B:#FF6B35;--C:#4F8EF7;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
body{padding-bottom:calc(66px + env(safe-area-inset-bottom))}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,25,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);padding:14px 18px 11px;
}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr-title span{
  background:linear-gradient(135deg,var(--blue) 0%,var(--violet) 60%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-sub{font-size:12px;color:var(--t2);margin-top:2px;letter-spacing:.2px}

/* ── BOTTOM NAV ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(15,17,25,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 8px;border:none;background:none;cursor:pointer;
  color:var(--dim);font-family:var(--font);font-size:10px;font-weight:600;
  letter-spacing:.3px;transition:color .15s;
}
.nb.on{color:var(--blue)}
.nb svg{width:22px;height:22px;stroke-width:2;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}

/* ── TABS ── */
.tab{display:none;padding-top:4px}
.tab.on{display:block}

/* ── SECTION LABEL ── */
.sec-lbl{
  font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--t2);
  text-transform:uppercase;padding:16px 18px 8px;
}

/* ══ TRAINING ══ */
.day-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px 8px}
.dc{
  background:var(--s2);border:1.5px solid var(--bd);border-radius:16px;
  padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s;
  min-height:82px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.dc .letter{font-size:28px;font-weight:900;line-height:1;transition:transform .2s}
.dc.on .letter{transform:scale(1.1)}
.dc .dname{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.6px}
.dc[data-d="A"] .letter{color:var(--A)}
.dc[data-d="B"] .letter{color:var(--B)}
.dc[data-d="C"] .letter{color:var(--C)}
.dc.on[data-d="A"]{border-color:var(--A);background:rgba(123,240,69,.07)}
.dc.on[data-d="B"]{border-color:var(--B);background:rgba(255,107,53,.07)}
.dc.on[data-d="C"]{border-color:var(--C);background:rgba(79,142,247,.09)}

.day-wrap{display:none}
.day-wrap.on{display:block}

/* progress */
.prog-row{display:flex;align-items:center;gap:10px;padding:10px 18px 6px}
.prog-bar{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .35s ease;width:0%}
.fill-A{background:linear-gradient(90deg,var(--A),#22c55e)}
.fill-B{background:linear-gradient(90deg,var(--B),#f59e0b)}
.fill-C{background:linear-gradient(90deg,var(--C),var(--violet))}
.prog-txt{font-size:11px;color:var(--dim);white-space:nowrap;font-weight:600}

/* section header */
.sh{
  display:flex;align-items:center;gap:9px;
  padding:11px 18px 7px;cursor:pointer;user-select:none;
}
.sh-bar{width:3px;border-radius:2px;flex-shrink:0;transition:height .2s}
.sh-name{font-size:11px;font-weight:700;letter-spacing:.8px;flex:1;text-transform:uppercase}
.sh-cnt{font-size:11px;color:var(--dim)}
.sh-chev{color:var(--dim);transition:transform .2s;flex-shrink:0}
.sh.closed .sh-chev{transform:rotate(-90deg)}
.sec-body{padding:0 16px}

/* exercise row */
.ex{
  display:flex;align-items:center;gap:11px;
  padding:11px 13px;background:var(--s2);border-radius:13px;
  margin-bottom:6px;min-height:62px;cursor:pointer;transition:opacity .25s;
}
.ex.done{opacity:.38}
.ex-cb{
  width:28px;height:28px;min-width:28px;border-radius:50%;
  border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;
  transition:all .18s;flex-shrink:0;
}
.ex-cb.chk{background:var(--blue);border-color:var(--blue)}
.ex-cb svg{display:none;width:14px;height:14px;stroke:white;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.ex-cb.chk svg{display:block}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:15px;font-weight:600;line-height:1.25}
.ex.done .ex-name{text-decoration:line-through;color:var(--dim)}
.ex-mus{font-size:12px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-badge{
  background:var(--s3);border-radius:9px;padding:5px 9px;
  font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;
  letter-spacing:-.2px;
}

/* reset */
.reset-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin:10px 16px 4px;padding:12px;width:calc(100% - 32px);
  background:var(--s2);border:1px solid var(--bd);border-radius:13px;
  color:var(--dim);font-family:var(--font);font-size:13px;font-weight:600;
  cursor:pointer;transition:color .15s,border-color .15s;
}
.reset-btn:active{color:var(--text);border-color:var(--t2)}
.reset-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* notes */
.notes{margin:14px 16px 6px;background:var(--s2);border-radius:15px;overflow:hidden}
.notes-hdr{
  padding:11px 14px;background:rgba(245,158,11,.08);
  border-bottom:1px solid var(--bd);
  font-size:11px;font-weight:700;letter-spacing:.7px;color:var(--amber);text-transform:uppercase;
}
.note-r{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)}
.note-r:last-child{border-bottom:none}
.note-lbl{font-size:11px;font-weight:700;color:var(--amber);min-width:88px;padding-top:1px}
.note-body{font-size:13px;color:var(--t2);line-height:1.45}

/* ══ NUTRITION ══ */
.macro-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  margin:12px 16px;background:var(--s2);border-radius:15px;overflow:hidden;border:1px solid var(--bd);
}
.mc{padding:12px 6px;text-align:center;border-right:1px solid var(--bd)}
.mc:last-child{border-right:none}
.mc-lbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.mc-val{font-size:17px;font-weight:800;margin-top:3px;letter-spacing:-.5px}
.mc-unit{font-size:10px;color:var(--dim)}

.meal-tabs{display:flex;gap:8px;padding:0 16px 10px}
.mt{
  flex:1;padding:10px;background:var(--s2);border:1.5px solid var(--bd);border-radius:11px;
  text-align:center;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;
  transition:all .15s;font-family:var(--font);
}
.mt.on{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.07)}

.meal-wrap{display:none}
.meal-wrap.on{display:block}

.meal-card{margin:0 16px 10px;background:var(--s2);border-radius:15px;overflow:hidden;border:1px solid var(--bd)}
.meal-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 14px;background:var(--s3);border-bottom:1px solid var(--bd)}
.meal-left{}
.meal-time{font-size:11px;color:var(--t2);font-weight:600}
.meal-title{font-size:15px;font-weight:700;margin-top:2px}
.meal-right{text-align:right;flex-shrink:0}
.meal-kcal{font-size:13px;font-weight:800;color:var(--amber)}
.meal-prot{font-size:11px;color:var(--green);margin-top:2px}
.meal-item{padding:9px 14px;border-bottom:1px solid var(--bd)}
.meal-item:last-child{border-bottom:none}
.meal-item-n{font-size:14px;font-weight:600}
.meal-item-d{font-size:12px;color:var(--t2);margin-top:2px;line-height:1.4}

/* shopping */
.shop-cat{margin:0 16px 8px;background:var(--s2);border-radius:15px;overflow:hidden;border:1px solid var(--bd)}
.shop-chdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.shop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.shop-cname{flex:1;font-size:13px;font-weight:700}
.shop-chev{color:var(--dim);transition:transform .2s}
.shop-chdr.open .shop-chev{transform:rotate(180deg)}
.shop-body{display:none}
.shop-body.open{display:block}
.shop-item{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 14px 9px 32px;border-top:1px solid var(--bd);gap:10px}
.shop-iname{font-size:14px;font-weight:600;flex:1}
.shop-inote{font-size:12px;color:var(--t2);margin-top:2px;line-height:1.3}
.shop-qty{font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0}

/* rules */
.rules-card{margin:0 16px 16px;background:var(--s2);border-radius:15px;overflow:hidden;border:1px solid var(--bd)}
.rule-r{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);align-items:flex-start}
.rule-r:last-child{border-bottom:none}
.rule-lbl{font-size:11px;font-weight:700;color:var(--amber);min-width:80px;padding-top:1px;text-transform:uppercase;letter-spacing:.3px}
.rule-body{font-size:13px;color:var(--t2);line-height:1.45;flex:1}

/* ══ SCHEDULE ══ */
.sched-tabs{display:flex;gap:6px;padding:12px 16px 8px;overflow-x:auto;scrollbar-width:none}
.sched-tabs::-webkit-scrollbar{display:none}
.st{
  flex-shrink:0;padding:8px 15px;background:var(--s2);border:1.5px solid var(--bd);border-radius:20px;
  font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;font-family:var(--font);
  transition:all .15s;letter-spacing:.2px;
}
.st.on{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,.08)}

.sc{display:none}
.sc.on{display:block}

/* week table */
.week-tbl{margin:0 16px 16px;border-radius:15px;overflow:hidden;border:1px solid var(--bd)}
.wr{display:grid;grid-template-columns:44px 1fr auto;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bd);align-items:start}
.wr:last-child{border-bottom:none}
.wr:nth-child(odd){background:var(--s2)}
.wr:nth-child(even){background:var(--s3)}
.wd{font-size:17px;font-weight:900;padding-top:1px}
.ws{}
.wb{
  display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:8px;
  font-size:11px;font-weight:700;margin-bottom:3px;
}
.wsub{font-size:11px;color:var(--t2)}
.wdinner{font-size:12px;color:var(--t2);text-align:right;max-width:100px;line-height:1.3}

/* cook */
.cook-card{margin:0 16px 12px;background:var(--s2);border-radius:15px;overflow:hidden;border:1px solid var(--bd)}
.cook-hdr{padding:12px 14px;background:rgba(251,146,60,.1);border-bottom:1px solid var(--bd)}
.cook-htitle{font-size:14px;font-weight:700;color:var(--orange)}
.cook-hsub{font-size:12px;color:var(--t2);margin-top:2px}
.cook-step{display:grid;grid-template-columns:48px 1fr;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);align-items:start}
.cook-step:last-child{border-bottom:none}
.cook-t{font-size:11px;font-weight:700;color:var(--orange);padding-top:2px}
.cook-n{font-size:14px;font-weight:600}
.cook-d{font-size:12px;color:var(--t2);margin-top:2px;line-height:1.35}

/* timeline */
.tl-card{margin:0 16px 12px;background:var(--s2);border-radius:15px;overflow:hidden;border:1px solid var(--bd)}
.tl-hdr{padding:11px 14px;border-bottom:1px solid var(--bd);background:var(--s3)}
.tl-htitle{font-size:13px;font-weight:700}
.tl-hsub{font-size:11px;color:var(--t2);margin-top:2px}
.tl-row{display:grid;grid-template-columns:50px 1fr;gap:8px;padding:9px 14px;border-bottom:1px solid var(--bd);align-items:start}
.tl-row:last-child{border-bottom:none}
.tl-t{font-size:13px;font-weight:700;padding-top:2px}
.tl-n{font-size:14px;font-weight:600}
.tl-d{font-size:12px;color:var(--t2);margin-top:2px;line-height:1.3}

/* shelf */
.shelf-card{margin:0 16px 16px;background:var(--s2);border-radius:15px;overflow:hidden;border:1px solid var(--bd)}
.shelf-r{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--bd);gap:12px}
.shelf-r:last-child{border-bottom:none}
.shelf-n{font-size:14px;font-weight:600}
.shelf-note{font-size:12px;color:var(--t2);margin-top:2px}
.shelf-d{font-size:15px;font-weight:800;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title"><span>ФИТНЕС-ПЛАН</span></div>
  <div class="hdr-sub">16 лет · 190 см · 70 кг · Push / Pull / Legs · 2950 ккал</div>
</header>

<!-- ══ TAB: ТРЕНИРОВКИ ══ -->
<section class="tab on" id="tab-train">

  <div class="day-grid">
    <div class="dc on" data-d="A" onclick="selDay('A')">
      <div class="letter">A</div>
      <div class="dname">PUSH</div>
    </div>
    <div class="dc" data-d="B" onclick="selDay('B')">
      <div class="letter">B</div>
      <div class="dname">PULL</div>
    </div>
    <div class="dc" data-d="C" onclick="selDay('C')">
      <div class="letter">C</div>
      <div class="dname">LEGS</div>
    </div>
  </div>

  <!-- day content rendered by JS -->
  <div id="days-root"></div>

</section>

<!-- ══ TAB: ПИТАНИЕ ══ -->
<section class="tab" id="tab-food">

  <div class="macro-row">
    <div class="mc">
      <div class="mc-lbl">Калории</div>
      <div class="mc-val" style="color:var(--amber)">2950</div>
      <div class="mc-unit">ккал</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">Белок</div>
      <div class="mc-val" style="color:var(--blue)">210</div>
      <div class="mc-unit">г</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">Углеводы</div>
      <div class="mc-val" style="color:var(--violet)">355</div>
      <div class="mc-unit">г</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">Жиры</div>
      <div class="mc-val" style="color:var(--cyan)">85</div>
      <div class="mc-unit">г</div>
    </div>
  </div>

  <div class="meal-tabs">
    <button class="mt on" onclick="selMeal('train',this)">День тренировки</button>
    <button class="mt" onclick="selMeal('rest',this)">День отдыха</button>
  </div>

  <div class="meal-wrap on" id="meal-train"></div>
  <div class="meal-wrap" id="meal-rest"></div>

  <div class="sec-lbl">СПИСОК ЗАКУПОК — НЕДЕЛЯ</div>
  <div id="shop-root"></div>

  <div class="sec-lbl">ПРАВИЛА ПИТАНИЯ</div>
  <div class="rules-card" id="rules-root"></div>

</section>

<!-- ══ TAB: РАСПИСАНИЕ ══ -->
<section class="tab" id="tab-sched">

  <div class="sched-tabs">
    <button class="st on" onclick="selSched('week',this)">Неделя</button>
    <button class="st" onclick="selSched('cook',this)">Готовка</button>
    <button class="st" onclick="selSched('tl',this)">Распорядок</button>
    <button class="st" onclick="selSched('shelf',this)">Хранение</button>
  </div>

  <div class="sc on" id="sc-week"></div>
  <div class="sc" id="sc-cook"></div>
  <div class="sc" id="sc-tl"></div>
  <div class="sc" id="sc-shelf"></div>

</section>

<!-- ══ BOTTOM NAV ══ -->
<nav class="nav">
  <button class="nb on" data-tab="train" onclick="selTab('train')">
    <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M3 8h3M18 8h3M3 16h3M18 16h3"/></svg>
    Тренировки
  </button>
  <button class="nb" data-tab="food" onclick="selTab('food')">
    <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    Питание
  </button>
  <button class="nb" data-tab="sched" onclick="selTab('sched')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Расписание
  </button>
</nav>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const DAYS = {
  A: {
    name:'PUSH', sub:'Грудь · Трицепс', color:'var(--A)',
    sections:[
      { name:'ГРУДЬ', color:'#4F8EF7', exs:[
        {id:'a1', name:'Жим штанги лёжа',           sets:'4 × 6–8',  m:'Грудь, трицепс, передние дельты'},
        {id:'a2', name:'Жим гантелей на наклонной', sets:'3 × 8–10', m:'Верхняя грудь, передние дельты'},
        {id:'a3', name:'Пекдек / Бабочка',          sets:'3 × 12',   m:'Грудь — изоляция'},
      ]},
      { name:'ТРИЦЕПС', color:'#7C6FF7', exs:[
        {id:'a4', name:'Разгибание косички из-за головы', sets:'3 × 12',   m:'Длинная головка трицепса'},
        {id:'a5', name:'Разгибание на тросе вниз rope',   sets:'3 × 12',   m:'Латеральная и медиальная головки'},
        {id:'a6', name:'Брусья / Skull Crushers',         sets:'3 × 8–10', m:'Чередуй через неделю — все головки'},
      ]},
      { name:'КОР [через тренировку]', color:'#22D3EE', exs:[
        {id:'a7', name:'Планка',                    sets:'3 × 60с', m:'Поперечная мышца, стабилизаторы'},
        {id:'a8', name:'Подъём ног в висе',         sets:'3 × 12',  m:'Нижний пресс, сгибатели бедра'},
        {id:'a9', name:'Скручивания на блоке',      sets:'3 × 15',  m:'Прямая мышца живота — изоляция'},
      ]},
    ]
  },
  B: {
    name:'PULL', sub:'Спина · Бицепс · Задние дельты', color:'var(--B)',
    sections:[
      { name:'СПИНА', color:'#FF6B35', exs:[
        {id:'b1', name:'Подтягивания / тяга верхнего блока', sets:'4 × 8–10', m:'Широчайшие, бицепс'},
        {id:'b2', name:'Тяга Т-грифа',                       sets:'4 × 8–10', m:'Широчайшие, средняя спина, бицепс'},
        {id:'b3', name:'Тяга верхнего блока узким хватом',   sets:'3 × 10',   m:'Нижняя часть широчайших, бицепс'},
      ]},
      { name:'ЗАДНИЕ ДЕЛЬТЫ', color:'#EC4899', exs:[
        {id:'b4', name:'Face pull — тяга троса к лицу', sets:'3 × 15', m:'Задние дельты, ротаторная манжета'},
      ]},

// ─── RENDER: TRAINING ────────────────────────────────────────────────────────

function renderDays() {
  const root = document.getElementById('days-root');
  let html = '';
  for (const [letter, day] of Object.entries(DAYS)) {
    const allIds = day.sections.flatMap(s => s.exs.map(e => e.id));
    const total = allIds.length;
    html += `
    <div class="day-wrap${letter==='A'?' on':''}" id="dw-${letter}">
      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill fill-${letter}" id="pf-${letter}" style="width:0%"></div></div>
        <div class="prog-txt" id="pt-${letter}">0 из ${total}</div>
      </div>`;

    for (const sec of day.sections) {
      html += `
      <div class="sh" id="sh-${sec.name.replace(/\s|\[|\]/g,'_')}_${letter}" onclick="toggleSec(this)">
        <div class="sh-bar" style="height:18px;background:${sec.color}"></div>
        <div class="sh-name" style="color:${sec.color}">${sec.name}</div>
        <div class="sh-cnt">${sec.exs.length}</div>
        <svg class="sh-chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sec-body" id="sb-${sec.name.replace(/\s|\[|\]/g,'_')}_${letter}">`;

      for (const ex of sec.exs) {
        html += `
        <div class="ex" id="er-${ex.id}" onclick="toggleEx('${ex.id}','${letter}')">
          <div class="ex-cb" id="cb-${ex.id}">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-mus">${ex.m}</div>
          </div>
          <div class="ex-badge">${ex.sets}</div>
        </div>`;
      }
      html += `</div>`;
    }

    html += `
      <button class="reset-btn" onclick="resetDay('${letter}',event)">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.72"/></svg>
        Сбросить тренировку
      </button>
      <div class="notes">
        <div class="notes-hdr">ВАЖНЫЕ ЗАМЕТКИ</div>`;
    for (const [lbl, body] of NOTES) {
      html += `<div class="note-r"><div class="note-lbl">${lbl}</div><div class="note-body">${body}</div></div>`;
    }
    html += `</div></div>`;
  }
  root.innerHTML = html;
  initCheckboxes();
}

function toggleSec(hdr) {
  hdr.classList.toggle('closed');
  const id = hdr.id.replace('sh-','sb-');
  const body = document.getElementById(id);
  if (body) body.style.display = hdr.classList.contains('closed') ? 'none' : '';
}

function toggleEx(id, letter) {
  const key = 'ex:' + id;
  localStorage.setItem(key, localStorage.getItem(key) === '1' ? '0' : '1');
  applyEx(id);
  updateProgress(letter);
}

function applyEx(id) {
  const done = localStorage.getItem('ex:' + id) === '1';
  const row = document.getElementById('er-' + id);
  const cb  = document.getElementById('cb-' + id);
  if (!row || !cb) return;
  row.classList.toggle('done', done);
  cb.classList.toggle('chk', done);
}

function initCheckboxes() {
  for (const [letter, day] of Object.entries(DAYS)) {
    for (const sec of day.sections) {
      for (const ex of sec.exs) applyEx(ex.id);
    }
    updateProgress(letter);
  }
}

function updateProgress(letter) {
  const day = DAYS[letter];
  const allIds = day.sections.flatMap(s => s.exs.map(e => e.id));
  const done = allIds.filter(id => localStorage.getItem('ex:' + id) === '1').length;
  const pct  = allIds.length ? (done / allIds.length * 100) : 0;
  const pf = document.getElementById('pf-' + letter);
  const pt = document.getElementById('pt-' + letter);
  if (pf) pf.style.width = pct + '%';
  if (pt) pt.textContent = done + ' из ' + allIds.length;
}

function resetDay(letter, e) {
  e.stopPropagation();
  const day = DAYS[letter];
  for (const sec of day.sections) {
    for (const ex of sec.exs) localStorage.setItem('ex:' + ex.id, '0');
  }
  initCheckboxes();
}

function selDay(letter) {
  document.querySelectorAll('.dc').forEach(d => d.classList.remove('on'));
  document.querySelectorAll('.day-wrap').forEach(d => d.classList.remove('on'));
  document.querySelector(`.dc[data-d="${letter}"]`).classList.add('on');
  document.getElementById('dw-' + letter).classList.add('on');
}

// ─── RENDER: NUTRITION ───────────────────────────────────────────────────────

function renderMeals() {
  renderMealList('meal-train', MEALS_TRAIN);
  renderMealList('meal-rest',  MEALS_REST);
}

function renderMealList(rootId, meals) {
  const root = document.getElementById(rootId);
  let html = '';
  for (const m of meals) {
    html += `
    <div class="meal-card">
      <div class="meal-hdr">
        <div class="meal-left">
          <div class="meal-time">${m.time}</div>
          <div class="meal-title">${m.title}</div>
        </div>
        <div class="meal-right">
          <div class="meal-kcal">${m.kcal} ккал</div>
          <div class="meal-prot">Белок ~${m.prot} г</div>
        </div>
      </div>`;
    for (const it of m.items) {
      html += `<div class="meal-item">
        <div class="meal-item-n">${it.n}</div>
        ${it.d ? `<div class="meal-item-d">${it.d}</div>` : ''}
      </div>`;
    }
    html += `</div>`;
  }
  root.innerHTML = html;
}

function renderShop() {
  const root = document.getElementById('shop-root');
  let html = '';
  for (let i = 0; i < SHOP.length; i++) {
    const cat = SHOP[i];
    const uid = 'sc' + i;
    html += `
    <div class="shop-cat">
      <div class="shop-chdr" onclick="toggleShopCat('${uid}',this)">
        <div class="shop-dot" style="background:${cat.color}"></div>
        <div class="shop-cname" style="color:${cat.color}">${cat.name}</div>
        <svg class="shop-chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="shop-body" id="${uid}">`;
    for (const it of cat.items) {
      html += `<div class="shop-item">
        <div class="shop-iname">${it.n}${it.note ? `<div class="shop-inote">${it.note}</div>` : ''}</div>
        <div class="shop-qty">${it.qty}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  root.innerHTML = html;
}

function toggleShopCat(uid, hdr) {
  const body = document.getElementById(uid);
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
}

function renderRules() {
  const root = document.getElementById('rules-root');
  let html = '';
  for (const [lbl, body] of RULES) {
    html += `<div class="rule-r"><div class="rule-lbl">${lbl}</div><div class="rule-body">${body}</div></div>`;
  }
  root.innerHTML = html;
}

function selMeal(type, btn) {
  document.querySelectorAll('.mt').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.meal-wrap').forEach(w => w.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('meal-' + type).classList.add('on');
}

// ─── RENDER: SCHEDULE ────────────────────────────────────────────────────────

function renderWeek() {
  const root = document.getElementById('sc-week');
  let html = '<div class="week-tbl">';
  for (const row of WEEK) {
    html += `
    <div class="wr">
      <div class="wd" style="color:${row.bcolor}">${row.day}</div>
      <div class="ws">
        <div class="wb" style="background:${row.bcolor}22;color:${row.bcolor}">${row.badge}</div>
        <div class="wsub">${row.sub}</div>
      </div>
      <div class="wdinner">${row.dinner}</div>
    </div>`;
  }
  html += '</div>';
  root.innerHTML = html;
}

function renderCook() {
  const root = document.getElementById('sc-cook');
  let html = '';

  // defrost schedule card
  html += `<div class="cook-card">
    <div class="cook-hdr" style="background:rgba(34,211,238,.08)">
      <div class="cook-htitle" style="color:var(--cyan)">РАЗМОРОЗКА — РАСПИСАНИЕ</div>
      <div class="cook-hsub">Перекладывай из морозилки в холодильник заранее</div>
    </div>`;
  for (const r of DEFROST) {
    html += `<div class="cook-step">
      <div class="cook-t" style="color:${r.c}">${r.t}</div>
      <div><div class="cook-n">${r.n}</div><div class="cook-d">${r.d}</div></div>
    </div>`;
  }
  html += `</div>`;

  for (const ck of COOK) {
    html += `<div class="cook-card">
      <div class="cook-hdr">
        <div class="cook-htitle">${ck.title}</div>
        <div class="cook-hsub">${ck.time}</div>
      </div>`;
    for (const s of ck.steps) {
      html += `<div class="cook-step">
        <div class="cook-t">${s.t}</div>
        <div><div class="cook-n">${s.n}</div>${s.d?`<div class="cook-d">${s.d}</div>`:''}</div>
      </div>`;
    }
    html += `</div>`;
  }
  root.innerHTML = html;
}

function renderTL() {
  const root = document.getElementById('sc-tl');
  const cards = [
    {title:'День тренировки (Пн / Ср / Сб)', sub:'Push A · Pull B · Legs C', rows: TL_TRAIN},
    {title:'День отдыха (Вт / Чт / Пт)',      sub:'Обычный режим',            rows: TL_REST},
    {title:'Воскресенье',                       sub:'Закупка + Готовка 1',      rows: TL_SUN},
  ];
  let html = '';
  for (const card of cards) {
    html += `<div class="tl-card">
      <div class="tl-hdr">
        <div class="tl-htitle">${card.title}</div>
        <div class="tl-hsub">${card.sub}</div>
      </div>`;
    for (const r of card.rows) {
      html += `<div class="tl-row" style="border-left-color:${r.c}">
        <div class="tl-t" style="color:${r.c}">${r.t}</div>
        <div><div class="tl-n">${r.n}</div>${r.d?`<div class="tl-d">${r.d}</div>`:''}</div>
      </div>`;
    }
    html += `</div>`;
  }
  root.innerHTML = html;
}

function renderShelf() {
  const root = document.getElementById('sc-shelf');
  let html = '<div class="shelf-card">';
  for (const r of SHELF) {
    html += `<div class="shelf-r">
      <div>
        <div class="shelf-n">${r.n}</div>
        <div class="shelf-note">${r.note}</div>
      </div>
      <div class="shelf-d" style="color:${r.c}">${r.days}</div>
    </div>`;
  }
  html += '</div>';
  root.innerHTML = html;
}

function selSched(id, btn) {
  document.querySelectorAll('.st').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.sc').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('sc-' + id).classList.add('on');
}

// ─── NAV ─────────────────────────────────────────────────────────────────────

function selTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.getElementById('tab-' + id).classList.add('on');
  document.querySelector(`.nb[data-tab="${id}"]`).classList.add('on');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderDays();
renderMeals();
renderShop();
renderRules();
renderWeek();
renderCook();
renderTL();
renderShelf();
</script>
</body>
</html>
